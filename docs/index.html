<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>个人生活空间</title><link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32.png"><link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png"><link rel="stylesheet" href="fontawesome.min.css"><style>html, body { margin: 0; padding: 0; width: 100%; height: 100%; } html.light, html.light body { background-color: #ffffff !important; color: #000000; } html.dark, html.dark body { background-color: #1a1a1a !important; color: #ffffff; }</style><script>(function() { const isInIframe = window.self !== window.top; function applyThemeToDOM(theme) { document.documentElement.classList.remove('light', 'dark'); document.documentElement.classList.add(theme); document.documentElement.setAttribute('data-theme', theme); } if (isInIframe) { window.addEventListener('message', function(event) { if (event.data && typeof event.data.theme === 'string') { const theme = event.data.theme; if (theme === 'light' || theme === 'dark') { applyThemeToDOM(theme); } } }); } else { applyThemeToDOM('light'); } })();</script></head><body><div id="root"></div><script defer="defer" src="bundle.js"></script></body></html>
